spring.config.import=classpath:env.properties

# ----------------------
# ?? ??
# ----------------------
server.port=8080
server.forward-headers-strategy=framework

# ----------------------
# DB ?? (MySQL)
# ----------------------
spring.datasource.url=${db.url}
spring.datasource.username=${db.username}
spring.datasource.password=${db.password}
spring.datasource.driver-class-name=${db.driver}

# ----------------------
# JPA ??
# ----------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Hibernate 6 ?? Dialect (MySQL ?? ????? ????? ?? ??)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ----------------------
# Google OAuth2 ??
# ----------------------
oauth2.google.client-id=${google.client.id}
oauth2.google.client-secret=${google.client.secret}
oauth2.google.redirect-uri=${google.redirect.uri}
oauth2.google.authorization-uri=${google.authorization.uri}

# ----------------------
# JWT ??
# ----------------------
jwt.secret-key=${jwt.secret.key}

# ----------------------
# Gemini API
# ----------------------
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=${GEMINI_API_URL}

# ----------------------
# ?? ??? ??
# ----------------------
file.upload.path=uploads/diary-images
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

spring.web.resources.static-locations=classpath:/static/,file:uploads/
spring.mvc.static-path-pattern=/**

# ----------------------
# ?? ??
# ----------------------
logging.level.com.example.emojournal.diary=DEBUG
logging.level.org.springframework.web.multipart=DEBUG
