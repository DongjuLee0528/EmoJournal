spring.config.import=classpath:env.properties

# ----------------------
# ?? ??
# ----------------------
server.port=8080
server.forward-headers-strategy=framework

# ----------------------
# DB ?? (MySQL)
# ----------------------
spring.datasource.url=${db.url}
spring.datasource.username=${db.username}
spring.datasource.password=${db.password}
spring.datasource.driver-class-name=${db.driver}

# ----------------------
# 커넥션 풀 설정
# ----------------------
spring.datasource.hikari.max-lifetime=1800000

# ----------------------
# JPA ??
# ----------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Hibernate 6 ?? Dialect (MySQL ?? ????? ????? ?? ??)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ----------------------
# Google OAuth2 ??
# ----------------------
oauth2.google.client-id=${google.client.id}
oauth2.google.client-secret=${google.client.secret}
oauth2.google.redirect-uri=${google.redirect.uri}
oauth2.google.authorization-uri=${google.authorization.uri}

# ----------------------
# JWT ??
# ----------------------
jwt.secret-key=${jwt.secret.key}

# ----------------------
# Gemini API
# ----------------------
gemini.api.base-url=https://generativelanguage.googleapis.com
gemini.api.key=${GEMINI_API_KEY}
gemini.model=gemini-2.0-flash

# ----------------------
# 파일 업로드 설정
# ----------------------
file.upload.path=/home/uploads/diary-images
app.base-url=${APP_BASE_URL:}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# ----------------------
# 로깅 설정
# ----------------------
logging.level.com.example.emojournal.diary=DEBUG
logging.level.org.springframework.web.multipart=DEBUG

# UTF-8 인코딩 설정 (한글 로그 깨짐 방지)
logging.charset.console=UTF-8
logging.charset.file=UTF-8
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# 콘솔 인코딩 강제 설정
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# HTTP 인코딩 설정
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
