# ----------------------
# \uC11C\uBC84 \uC124\uC815
# ----------------------
# \uC784\uC2DC \uD3EC\uD2B8
server.port=8080

# ----------------------
# DB \uC124\uC815 (MySQL)
# ----------------------
spring.datasource.url=${db.url}
spring.datasource.username=${db.username}
spring.datasource.password=${db.password}
spring.datasource.driver-class-name=${db.name}

# JPA \uC124\uC815 (MySQL \uAE30\uC900)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# ----------------------
# Google OAuth2 \uC124\uC815
# ----------------------
oauth2.google.client-id=${google.client.id}
oauth2.google.client-secret=${google.client.secret}
oauth2.google.redirect-uri=${google.redirect.uri}
oauth2.google.authorization-uri=${google.authorization.uri}

# JWT \uC124\uC815
jwt.secret-key=${jwt.secret.key}

# Gemini API
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=${GEMINI_API_URL}

# ----------------------
# \uD30C\uC77C \uC5C5\uB85C\uB4DC \uC124\uC815
# ----------------------
# \uD30C\uC77C \uC5C5\uB85C\uB4DC \uACBD\uB85C
file.upload.path=uploads/diary-images

# \uC2A4\uD504\uB9C1 \uBD80\uD2B8 \uD30C\uC77C \uC5C5\uB85C\uB4DC \uC124\uC815
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# \uC815\uC801 \uB9AC\uC18C\uC2A4 \uC124\uC815 (\uC5C5\uB85C\uB4DC\uB41C \uD30C\uC77C + \uAC10\uC815 \uC774\uBBF8\uC9C0)
spring.web.resources.static-locations=classpath:/static/,file:uploads/
spring.mvc.static-path-pattern=/**

# ----------------------
# \uB85C\uAE45 \uC124\uC815 (\uC77C\uAE30 \uAD00\uB828)
# ----------------------
logging.level.com.example.emojournal.diary=DEBUG
logging.level.org.springframework.web.multipart=DEBUG